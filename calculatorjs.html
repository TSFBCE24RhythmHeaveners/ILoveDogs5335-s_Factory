<html>
  <title>Calculator, but made using JavaScript - ILoveDogs5335's World</title>
  <div style="text-align: center; color: #9999ff; background-color: crimson; border: 5px solid firebrick; text-shadow: 2px 2px 2px #6666cc"> <a target="_self" href="https://ilovedogs5335.vercel.app"> <- Back to Main </a><a target="_self" href="https://ilovedogs5335.vercel.app/experiments.html"> <- Back to Experiments </a>
            <p>This is a calculator I made in Python, that I converted to JavaScript.</p>
            <button style="cursor: pointer;" onclick="calculator()">Calculate!</button>
            <script>
              var num1, num2;
              function calculator() {
                num1 = Number(window.prompt('Enter the first number.'));
                num2 = Number(window.prompt('Enter the second number.'));
                window.alert([
                  ['Addition result is ', num1 + num2, '. '].join(''), ['Subtraction result is ', num1 - num2, '. '].join(''), ['Multiplication result is', num1 * num2, '. '].join(''), ['Division result is', num1 / num2, '. '].join(''), ['Exponentation result is', Math.pow(num1, num2), '. '].join(''), ['Root result is', Math.pow(num1, 1 / num2), '.'].join('')
                ].join(''));
              }
            </script>
            <p>Click the button to do a calculation!</p>
  </div>
</html>
